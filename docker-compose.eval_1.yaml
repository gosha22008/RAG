services:
  vllm_eval_1:
    image: vllm/vllm-openai:latest
    container_name: vllm_eval_1
    ports:
      - "8000:8000"
    volumes:
  # Локальная папка для всех весов моделей HuggingFace
      - ./.hf_cache/eval_1:/root/.cache/huggingface
    # environment:
      # - VLLM_USE_V1=0               
      # - VLLM_ATTENTION_BACKEND=TRITON
      # - VLLM_ENGINE_VERSION=v0
      # - VLLM_ATTN_BACKEND=TRITON_ATTN
    command:                                     
      RedHatAI/Meta-Llama-3.1-8B-Instruct-FP8
      --enforce-eager
      --gpu-memory-utilization 0.87
      --max-model-len 4096
      --max-num-batched-tokens 4096
      --max-num-seqs 32
      --served-model-name qwen3-14b
      --trust-remote-code
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # restart: unless-stopped
    # shm_size: 8gb
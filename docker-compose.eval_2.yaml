services:
  vllm_eval_1:
    image: vllm/vllm-openai:latest
    container_name: vllm_eval_1
    ports:
      - "8000:8000"
    volumes:
  # Локальная папка для всех весов моделей HuggingFace
      - ./.hf_cache/eval_2:/root/.cache/huggingface
    # environment:
      # - VLLM_USE_V1=0               
      # - VLLM_ATTENTION_BACKEND=TRITON
      # - VLLM_ENGINE_VERSION=v0
      # - VLLM_ATTN_BACKEND=TRITON_ATTN
    command:                                     
      jeffcookio/Mistral-Small-3.2-24B-Instruct-2506-awq-sym
      --enforce-eager
      --gpu-memory-utilization 0.92
      --max-model-len 512
      --max-num-batched-tokens 512
      --max-num-seqs 4
      --served-model-name qwen3-14b
      --trust-remote-code
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # restart: unless-stopped
    # shm_size: 8gb